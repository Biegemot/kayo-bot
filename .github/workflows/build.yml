name: Build Windows Executable

on:
  push:
    branches: [ main ]
    tags: [ 'v*.*.*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: windows-latest

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.9'

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
        pip install pyinstaller

    - name: Set executable name
      id: vars
      shell: bash
      run: |
        if [[ "${{ github.ref_type }}" == "tag" && "${{ github.ref_name }}" =~ ^v ]]; then
          VERSION="${{ github.ref_name }}"
        else
          VERSION="dev"
        fi
        echo "executable_name=kayo-bot-$VERSION" >> $GITHUB_OUTPUT

    - name: Build Windows executable
      run: |
        pyinstaller --onefile --name kayo-bot-${{ steps.vars.outputs.executable_name }} main.py

    - name: Upload artifact
      uses: actions/upload-artifact@v4
      with:
        name: kayo-bot-windows-executable
        path: dist/kayo-bot-*.exe

    - name: Create Release (on tag push)
      if: startsWith(github.ref, 'refs/tags/')
      id: create_release
      uses: actions/create-release@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PERSONAL_TOKEN }}
      with:
        tag_name: ${{ github.ref_name }}
        release_name: Release ${{ github.ref_name }}
        draft: false
        prerelease: false

    - name: Upload Release Asset (on tag push)
      if: startsWith(github.ref, 'refs/tags/')
      uses: actions/upload-release-asset@v1
      env:
        GITHUB_TOKEN: ${{ secrets.GH_PERSONAL_TOKEN }}
      with:
        upload_url: ${{ steps.create_release.outputs.upload_url }}
        asset_path: dist/kayo-bot-${{ steps.vars.outputs.executable_name }}.exe
        asset_name: kayo-bot-${{ steps.vars.outputs.executable_name }}.exe
        asset_content_type: application/octet-stream