name: Release

on:
  push:
    branches: [main]
    paths:
      - 'version.txt'

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Prepare Windows-specific files
        shell: bash
        run: |
          # Создаем Windows-специфичный entry point
          cat > windows_main.py << 'EOF'
          #!/usr/bin/env python3
          """
          Windows-specific entry point for Kayo Bot.
          This script handles Windows path separators and encoding.
          """
          import os
          import sys
          
          # Fix Windows path issues
          if os.name == 'nt':
              # Add current directory to path
              sys.path.insert(0, os.path.dirname(os.path.abspath(__file__)))
          
          # Fix for Windows console encoding - more robust check
          if hasattr(sys.stdout, 'encoding') and sys.stdout.encoding != 'utf-8':
              import io
              sys.stdout = io.TextIOWrapper(sys.stdout.buffer, encoding='utf-8')
          if hasattr(sys.stderr, 'encoding') and sys.stderr.encoding != 'utf-8':
              import io
              sys.stderr = io.TextIOWrapper(sys.stderr.buffer, encoding='utf-8')
          
          # Import and run main
          from main import main
          
          if __name__ == '__main__':
              main()
          EOF
          
          echo "notes_created=true" >> $GITHUB_OUTPUT

      - name: Fix icon file permissions
        shell: bash
        run: |
          chmod 644 bot/assets/icon.ico
          ls -la bot/assets/icon.ico

      - name: Build Windows exe with improved compatibility
        shell: bash
        run: |
          pyinstaller --onefile \
            --name "kayo-bot-v${{ steps.version.outputs.version }}-windows" \
            --hidden-import bot.gui \
            --hidden-import bot.handlers.rp_utils \
            --hidden-import bot.handlers.general \
            --hidden-import bot.handlers.profile \
            --hidden-import bot.handlers.stats \
            --hidden-import bot.services.activity \
            --hidden-import bot.services.db_manager \
            --hidden-import bot.services.auto_update \
            --hidden-import bot.logging \
            --collect-all certifi \
            --add-data "bot;bot" \
            --add-data "version.txt;." \
            --add-data ".env.example;." \
            --icon "bot/assets/icon.ico" \
            --windowed \
            windows_main.py

      - name: Create Windows launcher script
        shell: bash
        run: |
          # Create a simple batch file for Windows users
          cat > launch_kayo.bat << 'EOF'
          @echo off
          chcp 65001 > nul
          echo Starting Kayo Bot...
          if exist "%~dp0kayo-bot-v${{ steps.version.outputs.version }}-windows.exe" (
              "%~dp0kayo-bot-v${{ steps.version.outputs.version }}-windows.exe"
          ) else (
              echo Error: Could not find Kayo Bot executable.
              pause
          )
          EOF

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kayo-bot-windows-v${{ steps.version.outputs.version }}
          path: |
            dist/kayo-bot-v${{ steps.version.outputs.version }}-windows.exe
            launch_kayo.bat

  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Linux binary
        shell: bash
        run: |
          pyinstaller --onefile \
            --name "kayo-bot-v${{ steps.version.outputs.version }}-linux" \
            --hidden-import bot.gui \
            --hidden-import bot.handlers.rp_utils \
            --hidden-import bot.handlers.general \
            --hidden-import bot.handlers.profile \
            --hidden-import bot.handlers.stats \
            --hidden-import bot.services.activity \
            --hidden-import bot.services.db_manager \
            --hidden-import bot.services.auto_update \
            --hidden-import bot.logging \
            --collect-all certifi \
            --add-data "bot:bot" \
            --add-data "version.txt:." \
            --add-data ".env.example:." \
            main.py

      - name: Create Linux launcher script
        shell: bash
        run: |
          # Create a simple shell script for Linux users
          cat > launch_kayo.sh << 'EOF'
          #!/bin/bash
          echo "Starting Kayo Bot..."
          cd "$(dirname "$0")"
          if [ -f "./kayo-bot-v${{ steps.version.outputs.version }}-linux" ]; then
              chmod +x "./kayo-bot-v${{ steps.version.outputs.version }}-linux"
              ./kayo-bot-v${{ steps.version.outputs.version }}-linux
          else
              echo "Error: Could not find Kayo Bot executable."
              exit 1
          fi
          EOF

      - name: Make launcher script executable
        shell: bash
        run: chmod +x launch_kayo.sh

      - name: Upload Linux artifacts
        uses: actions/upload-artifact@v4
        with:
          name: kayo-bot-linux-v${{ steps.version.outputs.version }}
          path: |
            dist/kayo-bot-v${{ steps.version.outputs.version }}-linux
            launch_kayo.sh

  create-release:
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: kayo-bot-windows-v${{ steps.version.outputs.version }}
          path: artifacts/windows

      - name: Download Linux artifacts
        uses: actions/download-artifact@v4
        with:
          name: kayo-bot-linux-v${{ steps.version.outputs.version }}
          path: artifacts/linux

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Kayo Bot v${{ steps.version.outputs.version }}
          body_path: release_notes.md
          draft: false
          prerelease: false
          files: |
            artifacts/windows/kayo-bot-v${{ steps.version.outputs.version }}-windows.exe
            artifacts/windows/launch_kayo.bat
            artifacts/linux/kayo-bot-v${{ steps.version.outputs.version }}-linux
            artifacts/linux/launch_kayo.sh
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}