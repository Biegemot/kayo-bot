name: Release

on:
  push:
    branches: [main]
    paths:
      - 'version.txt'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Read version
        id: version
        shell: bash
        run: echo "version=$(cat version.txt | tr -d '[:space:]')" >> $GITHUB_OUTPUT

      - name: Check if tag already exists
        id: tag_check
        shell: bash
        run: |
          if git ls-remote --tags origin "refs/tags/v${{ steps.version.outputs.version }}" | grep -q .; then
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

      - name: Create tag
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git tag v${{ steps.version.outputs.version }}
          git push origin v${{ steps.version.outputs.version }}

      - name: Set up Python
        if: steps.tag_check.outputs.exists == 'false'
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        if: steps.tag_check.outputs.exists == 'false'
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller

      - name: Build Windows executable
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          pyinstaller --onefile --name "kayo-bot-v${{ steps.version.outputs.version }}-win" main.py

      - name: Build Linux binary
        if: steps.tag_check.outputs.exists == 'false'
        shell: bash
        run: |
          pyinstaller --onefile --name "kayo-bot-v${{ steps.version.outputs.version }}-linux" main.py

      - name: Create GitHub Release
        if: steps.tag_check.outputs.exists == 'false'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: Release v${{ steps.version.outputs.version }}
          generate_release_notes: true
          files: |
            dist/kayo-bot-v${{ steps.version.outputs.version }}-win.exe
            dist/kayo-bot-v${{ steps.version.outputs.version }}-linux
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
